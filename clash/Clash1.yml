mixed-port: 7890
tcp-concurrent: false
allow-lan: true
ipv6: true
mode: Rule
log-level: info
global-client-fingerprint: chrome
find-process-mode: strict
external-controller: 0.0.0.0:9090
geodata-mode: true
geo-auto-update: true
geo-update-interval: 3
geox-url:
